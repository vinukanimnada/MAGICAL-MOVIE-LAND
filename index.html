    <ul>
      <li><a href="#">Home</a></li>

      <div class="buttons">
        <button class="watch-btn">▶ WATCH NOW</button>
        <button class="add-btn">+</button>
      </div>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
